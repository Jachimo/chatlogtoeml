name: Security audit

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

# Minimal read-only permissions; audit jobs don't need write access.
permissions:
  contents: read

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Export locked requirements
        run: uv export --format requirements-txt > /tmp/requirements.txt

      - name: Audit dependencies
        run: uvx pip-audit -r /tmp/requirements.txt
